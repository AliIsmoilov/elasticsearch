services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
      POSTGRES_DB: dbname
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  app:
    build: .
    image: elasticsearch-app:latest
    depends_on:
      - postgres
      - elasticsearch
    environment:
      # The app prefers DATABASE_URL; override if you want to use individual POSTGRES_* vars
      - DATABASE_URL=postgres://dbuser:dbpass@postgres:5432/dbname?sslmode=disable
      - ELASTIC_ADDR=http://elasticsearch:9200
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  pgdata:
  esdata:
